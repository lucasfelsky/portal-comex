name: Deploy to Firebase Hosting (production)

on:
  push:
    branches:
      - main    # branch que publica em produção

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (production)
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools@latest deploy --only hosting --config firebase.portal-comex.json --project sq-comex-updates-3d22f

      - name: Aviso se FIREBASE_TOKEN ausente
        if: ${{ secrets.FIREBASE_TOKEN == '' }}
        run: |
          echo "::warning::FIREBASE_TOKEN nao configurado — deploy de hosting pulado. Gere um token com 'firebase login:ci' (local) e adicione como secret FIREBASE_TOKEN no GitHub (Settings > Secrets and variables > Actions)."
