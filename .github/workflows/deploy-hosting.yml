name: Deploy to Firebase Hosting (production)

on:
  push:
    branches:
      - main    # branch que publica em produção

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # O contexto "secrets" nao pode ser usado em "if" de step diretamente.
      # Por isso injetamos no env do job e checamos via env.FIREBASE_TOKEN.
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Validar config do Firebase para o build
        run: |
          missing=0
          for v in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            val=$(printenv "$v" || true)
            if [ -z "$val" ]; then
              echo "::error::Secret/variavel ausente: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Config do Firebase incompleta — o build seria publicado com Firebase Auth desativado ('Firebase Auth nao configurado'). Adicione os secrets VITE_FIREBASE_* no GitHub (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "Config do Firebase OK para o build."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting (production)
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting --config firebase.portal-comex.json --project sq-comex-updates-3d22f > deploy.log 2>&1
          code=$?
          cat deploy.log
          if [ "$code" -ne 0 ]; then
            # HTTP 400 "is the current active version" = versao buildada identica a
            # ativa em producao (nada a publicar). Tratar como sucesso.
            if grep -q "is the current active version" deploy.log; then
              echo "::notice::Versao de hosting identica a ativa em producao — nada a publicar."
              exit 0
            fi
            exit "$code"
          fi

      - name: Aviso se FIREBASE_TOKEN ausente
        if: ${{ env.FIREBASE_TOKEN == '' }}
        run: |
          echo "::warning::FIREBASE_TOKEN nao configurado — deploy de hosting pulado. Gere um token com 'firebase login:ci' (local) e adicione como secret FIREBASE_TOKEN no GitHub (Settings > Secrets and variables > Actions)."