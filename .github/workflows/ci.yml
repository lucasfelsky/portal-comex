name: CI

# Workflow de integracao continua do Portal COMEX.
# - Vitest unit (165 casos em 16 arquivos, com pretest que roda audit de drift L16)
# - Vite build
# - Firebase rules dry-run
# - Upload de dist/ como artifact (10 dias) para debug de releases
#
# Cache: setup-node@4 com cache='npm' ja' cuida do cache de ~/.npm
# baseado em package-lock.json. Nao precisa de action/cache separado.
#
# Secrets necessarios (configurar em Settings > Secrets and variables > Actions):
#   FIREBASE_TOKEN  - token `firebase login:ci` (apenas para o dry-run).
#                     Para deploy automatico, ver `deploy-hosting.yml` que
#                     suporta GCP_SA_KEY (preferencial) ou FIREBASE_TOKEN (legacy).
#
# Obs.: Portal COMEX NAO tem testes E2E (Playwright) ainda. A extensao
# de UI tests (jsdom + @testing-library) esta em tests/ui/.

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-build:
    name: Unit + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      - name: Upload dist/ artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: portal-comex-dist
          path: dist/
          retention-days: 10
          if-no-files-found: error

  rules-validation:
    name: Firestore rules (dry-run)
    runs-on: ubuntu-latest
    needs: unit-and-build
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install
        run: npm ci

      - name: Validate firestore.rules
        # firebase-tools ja vem em devDependencies (Sprint 4.1).
        # O dry-run valida a sintaxe do rules sem precisar de emulador Java 21+
        # (necessario para o emulador Firestore de verdade).
        run: node node_modules/firebase-tools/lib/bin/firebase.js --config firebase.portal-comex.json --project sq-comex-updates-3d22f deploy --only firestore:rules --dry-run --non-interactive
